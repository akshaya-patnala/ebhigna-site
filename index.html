<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strides Landing</title>
  <style>
    /* Reset default margin and make full height */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevents scroll */
    }

    /* Fullscreen image style */
    .fullscreen-image {
      width: 100vw;
      height: 100vh;
      object-fit: cover;  /* covers screen without distortion */
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Landing poster -->
  <img 
    src="strides-poster.jpg"  <!-- replace with your image path -->
    alt="Strides Poster"
    class="fullscreen-image"
    id="landingImage"
  />

  <script>
    // Navigate to next page when image is clicked
    document.getElementById('landingImage').addEventListener('click', () => {
      window.location.href = 'nextpage.html'; // replace with your next page
    });
  </script>

</body>
</html>
